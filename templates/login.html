<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CampusRetain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <div class="p-8 pb-6 bg-indigo-600 text-center text-white">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-indigo-600 font-bold text-3xl mx-auto mb-4 shadow-lg shrink-0">C</div>
            <h1 class="text-2xl font-bold tracking-tight">CampusRetain</h1>
            <p class="text-indigo-200 text-sm mt-1">Student Portal Login</p>
        </div>
        
        <div class="p-8">
            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-6 text-sm font-medium flex items-center gap-2">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Organization Email</label>
                    <input type="email" name="email" placeholder="student@ced.alliance.edu.in" required class="w-full border border-slate-200 p-3 rounded-xl bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required class="w-full border border-slate-200 p-3 rounded-xl bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600 transition">
                </div>
                
                <button type="submit" class="w-full py-3 mt-4 bg-slate-900 text-white rounded-xl font-bold hover:bg-indigo-600 transition shadow-lg shadow-slate-200 flex justify-center items-center">
                    Login / Register
                </button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <a href="/admin_login" class="text-sm font-semibold text-slate-400 hover:text-indigo-600 transition">Are you an Admin? Login here</a>
            </div>
        </div>
    </div>
</body>
</html>
