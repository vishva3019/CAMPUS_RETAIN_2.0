<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CampusRetain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">

    <!-- Header -->
    <div class="p-8 pb-6 bg-indigo-600 text-center text-white">
        <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-indigo-600 font-bold text-3xl mx-auto mb-4 shadow-lg">C</div>
        <h1 class="text-2xl font-bold tracking-tight">CampusRetain</h1>
        <p class="text-indigo-200 text-sm mt-1">Student Portal Login</p>
    </div>

    <!-- Body -->
    <div class="p-8">

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-6 text-sm font-medium">
            {{ error }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form action="/login" method="POST" class="space-y-5">

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">
                    Organization Email
                </label>
                <input type="email"
                       name="email"
                       placeholder="student@ced.alliance.edu.in"
                       required
                       class="w-full border border-slate-200 p-3 rounded-xl bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600 transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">
                    Password
                </label>
                <input type="password"
                       name="password"
                       placeholder="••••••••"
                       required
                       class="w-full border border-slate-200 p-3 rounded-xl bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600 transition">
            </div>

            <button type="submit"
                    class="w-full py-3 mt-4 bg-slate-900 text-white rounded-xl font-bold hover:bg-indigo-600 transition shadow-lg">
                Login / Auto Register
            </button>

        </form>

        <!-- Forgot Password -->
        <div class="mt-4 text-center">
            <button onclick="openForgotModal()"
                    class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition">
                Forgot Password?
            </button>
        </div>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <a href="/admin_login"
               class="text-sm font-semibold text-slate-400 hover:text-indigo-600 transition">
                Are you an Admin? Login here
            </a>
        </div>

    </div>
</div>

<!-- ====================================== -->
<!-- Forgot Password Modal -->
<!-- ====================================== -->

<div id="forgotModal"
     class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">

    <div class="bg-white w-full max-w-md rounded-3xl p-8 relative shadow-2xl">

        <button onclick="closeForgotModal()"
                class="absolute top-4 right-4 text-slate-400 hover:text-black">
            ✕
        </button>

        <h2 class="text-2xl font-bold mb-2">Reset Password</h2>
        <p class="text-sm text-slate-500 mb-6">
            Enter your organization email to receive OTP.
        </p>

        <!-- Step 1 -->
        <div id="step1">

            <input type="email"
                   id="fp_email"
                   placeholder="student@ced.alliance.edu.in"
                   class="w-full border p-3 rounded-xl mb-4">

            <button onclick="sendOTP()"
                    class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700">
                Send OTP
            </button>

        </div>

        <!-- Step 2 -->
        <div id="step2" class="hidden">

            <input type="text"
                   id="fp_otp"
                   placeholder="Enter OTP"
                   class="w-full border p-3 rounded-xl mb-3">

            <input type="password"
                   id="fp_new_password"
                   placeholder="New Password"
                   class="w-full border p-3 rounded-xl mb-4">

            <button onclick="resetPassword()"
                    class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800">
                Reset Password
            </button>

        </div>

        <p id="fp_message"
           class="text-sm text-center mt-4 font-semibold"></p>

    </div>
</div>

<script>

function openForgotModal(){
    document.getElementById('forgotModal').classList.remove('hidden');
}

function closeForgotModal(){
    document.getElementById('forgotModal').classList.add('hidden');
}

async function sendOTP(){

    const email = document.getElementById('fp_email').value;

    const form = new FormData();
    form.append("email", email);

    const res = await fetch("/forgot-password", {
        method: "POST",
        body: form
    });

    const txt = await res.text();

    document.getElementById("fp_message").innerText = txt;

    if(txt.toLowerCase().includes("otp")){
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("step2").classList.remove("hidden");
    }
}

async function resetPassword(){

    const form = new FormData();

    form.append("email", document.getElementById("fp_email").value);
    form.append("otp", document.getElementById("fp_otp").value);
    form.append("new_password", document.getElementById("fp_new_password").value);

    const res = await fetch("/reset-password", {
        method: "POST",
        body: form
    });

    const txt = await res.text();

    document.getElementById("fp_message").innerText = txt;

    if(txt.toLowerCase().includes("updated")){
        setTimeout(() => {
            closeForgotModal();
        }, 1500);
    }
}

</script>

</body>
</html>
