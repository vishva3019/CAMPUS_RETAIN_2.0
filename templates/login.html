

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Retain | Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
}
</style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">

    <!-- Header -->
    <div class="bg-indigo-600 text-white p-8 text-center">
        <div class="w-16 h-16 mx-auto rounded-2xl bg-white text-indigo-600 font-black text-3xl flex items-center justify-center shadow-lg">
            C
        </div>

        <h1 class="text-3xl font-black mt-4">Campus Retain</h1>
        <p class="text-indigo-100 mt-1 text-sm">
            Lost & Found Student Portal
        </p>
    </div>

    <!-- Body -->
    <div class="p-8">

        {% if error %}
        <div class="mb-5 bg-rose-50 border border-rose-200 text-rose-600 px-4 py-3 rounded-xl text-sm font-semibold">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">
                    Organization Email
                </label>

                <input type="email"
                       name="email"
                       required
                       placeholder="student@ced.alliance.edu.in"
                       class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600 transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">
                    Password
                </label>

                <input type="password"
                       name="password"
                       required
                       placeholder="••••••••"
                       class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600 transition">
            </div>

            <button type="submit"
                    class="w-full py-3 rounded-xl bg-slate-900 text-white font-bold hover:bg-indigo-600 transition shadow-lg">
                Login / Auto Register
            </button>

        </form>

        <!-- Forgot password -->
        <div class="mt-5 text-center">
            <button onclick="openForgot()"
                    class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition">
                Forgot Password?
            </button>
        </div>

        <!-- Admin -->
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <a href="/admin_login"
               class="text-sm font-semibold text-slate-400 hover:text-indigo-600 transition">
                Are you an Admin? Login here
            </a>
        </div>

    </div>

</div>

<!-- Forgot Password Modal -->
<div id="forgotModal"
     class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center px-4">

<div class="bg-white w-full max-w-md rounded-3xl p-8 relative">

<button onclick="closeForgot()"
        class="absolute top-4 right-4 text-slate-400 hover:text-black">
✕
</button>

<h2 class="text-2xl font-bold">Reset Password</h2>
<p class="text-sm text-slate-500 mt-1 mb-6">
Enter your email to receive OTP.
</p>

<!-- Step 1 -->
<div id="step1">

<input id="fp_email"
       type="email"
       placeholder="student@ced.alliance.edu.in"
       class="w-full border rounded-xl px-4 py-3 mb-4">

<button onclick="sendOTP()"
        class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700">
Send OTP
</button>

</div>

<!-- Step 2 -->
<div id="step2" class="hidden">

<input id="fp_otp"
       type="text"
       placeholder="Enter OTP"
       class="w-full border rounded-xl px-4 py-3 mb-3">

<input id="fp_password"
       type="password"
       placeholder="New Password"
       class="w-full border rounded-xl px-4 py-3 mb-4">

<button onclick="resetPassword()"
        class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">
Reset Password
</button>

</div>

<p id="msg"
   class="text-sm font-semibold text-center mt-4"></p>

</div>
</div>

<script>

function openForgot(){
    document.getElementById("forgotModal").classList.remove("hidden");
}

function closeForgot(){
    document.getElementById("forgotModal").classList.add("hidden");
}

async function sendOTP(){

    let fd = new FormData();
    fd.append("email", document.getElementById("fp_email").value);

    let res = await fetch("/forgot-password",{
        method:"POST",
        body:fd
    });

    let txt = await res.text();

    document.getElementById("msg").innerText = txt;

    if(txt.toLowerCase().includes("otp")){
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("step2").classList.remove("hidden");
    }
}

async function resetPassword(){

    let fd = new FormData();

    fd.append("email", document.getElementById("fp_email").value);
    fd.append("otp", document.getElementById("fp_otp").value);
    fd.append("password", document.getElementById("fp_password").value);

    let res = await fetch("/verify-otp",{
        method:"POST",
        body:fd
    });

    let txt = await res.text();

    document.getElementById("msg").innerText = txt;

    if(txt.toLowerCase().includes("successful")){
        setTimeout(()=>{
            closeForgot();
        },1500);
    }
}

</script>

</body>
</html>
