<!-- templates/admin_login.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Retain | Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
}
</style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">

    <!-- Header -->
    <div class="bg-slate-900 text-white p-8 text-center">
        <div class="w-16 h-16 mx-auto rounded-2xl bg-white text-slate-900 font-black text-3xl flex items-center justify-center shadow-lg">
            A
        </div>

        <h1 class="text-3xl font-black mt-4">Admin Portal</h1>
        <p class="text-slate-300 mt-1 text-sm">
            Campus Retain Management Access
        </p>
    </div>

    <!-- Body -->
    <div class="p-8">

        {% if error %}
        <div class="mb-5 bg-rose-50 border border-rose-200 text-rose-600 px-4 py-3 rounded-xl text-sm font-semibold">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/admin_login" class="space-y-5">

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">
                    Admin Email
                </label>

                <input type="email"
                       name="email"
                       required
                       placeholder="admin@campusretain.com"
                       class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-slate-900 transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">
                    Password
                </label>

                <input type="password"
                       name="password"
                       required
                       placeholder="••••••••"
                       class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-slate-900 transition">
            </div>

            <button type="submit"
                    class="w-full py-3 rounded-xl bg-slate-900 text-white font-bold hover:bg-indigo-600 transition shadow-lg">
                Login as Admin
            </button>

        </form>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <a href="/login"
               class="text-sm font-semibold text-slate-400 hover:text-indigo-600 transition">
                Back to Student Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
